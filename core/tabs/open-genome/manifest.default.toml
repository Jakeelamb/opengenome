# Shipped default - copied to ~/.config/open-genome/manifest.toml on first init.
# Edit the user copy to lock paths and toggle modules.

[paths]
reference = ""
dataset = ""
workdir = ""
threads = ""

[conda]
# Prefer conda by default; set conda_exe to mamba manually if desired.
prefer_mamba = false
# Optional user-local Miniforge install root managed by Open Genome.
install_root = ""
# Optional: absolute path to conda executable.
# conda_exe = "/opt/miniforge3/bin/conda"

[privacy]
# Open Genome may download public tools, pipelines, and references, but user data stays local.
local_only = true

[sample]
input_dir = ""
sample_id = ""
patient_id = ""
input_type = ""
sex = "NA"
status = "0"
samplesheet = ""
sarek_samplesheet = ""
recommended_plan = ""

[reference]
profile = "gatk_grch38"
bundle_dir = ""
fasta = ""
fai = ""
dict = ""
bwa_index_ready = false
dbsnp = ""
known_indels = ""
mills_indels = ""
thousand_genomes_snps = ""

[workflow]
engine = "opengenome"
pipeline_version = "v1"
sarek_version = "3.8.1"
runtime = "conda"
native_profile = "opengenome"
sarek_runtime = "conda"
outdir = ""
params_file = ""
command_file = ""
recommended_plan = ""
last_run_dir = ""
denovo_outdir = ""
denovo_params_file = ""
denovo_command_file = ""
denovo_last_run_dir = ""

[results]
summary_file = ""
multiqc_dir = ""
variant_stats_file = ""
report_dir = ""
report_html = ""
findings_tsv = ""
evidence_json = ""
denovo_report_dir = ""
denovo_report_html = ""
denovo_summary_tsv = ""
denovo_manifest_json = ""

[cache]
root = ""
release_manifest = ""
clinvar_vcf = ""
clinvar_tbi = ""
dbsnp_vcf = ""
dbsnp_tbi = ""
gnomad_vcf = ""
gnomad_tbi = ""
vep_cache = ""
snpeff_db = ""
snpeff_config = ""
pharmcat_jar = ""
clair3_hifi_model = ""
clair3_ont_model = ""

# Module ids match directories under open-genome/modules/<id>/

[[modules]]
id = "opengenome"
enabled = true

[[modules]]
id = "genome_browser"
enabled = true

[[modules]]
id = "denovo_assembly"
enabled = true
