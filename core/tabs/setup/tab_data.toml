name = "Start Here"

[[data]]
name = "Start guided setup"
description = "Recommended first step. Choose folders, import data, then let Open Genome pick the safest workflow defaults."
script = "scripts/first_time_setup.sh"
task_list = "START"
multi_select = false

[[data]]
name = "Check what is ready"
description = "Plain-language checklist showing what is ready, what is missing, and what to do next."
script = "scripts/show_paths.sh"
task_list = "CHECK"
multi_select = false

[[data]]
name = "Try sample data"
description = "Generate tiny local demo data and preview reports for reference variants, existing VCFs, and de novo assembly without running heavy workflows."
script = "scripts/use_sample_human_dataset.sh"
task_list = "DEMO"
multi_select = false

[[data]]
name = "Run human validation dataset"
description = "Download public GIAB HG003 chr20 HiFi data, downsample it, run the reference, existing VCF, and de novo pipelines, then keep outputs reloadable."
script = "scripts/run_human_validation_dataset.sh"
task_list = "VALIDATE"
multi_select = false

[[data]]
name = "Load existing results"
description = "Choose a previous Open Genome results folder so the report can be opened without rerunning analysis."
script = "scripts/set_results_path.sh"
task_list = "RESULTS"
multi_select = false

[[data]]
name = "Advanced manual setup"
multi_select = false

[[data.entries]]
name = "Install or update local tools"
description = "Install the local Open Genome tool environments. Your genome data stays on this computer."
script = "scripts/conda_install_all_recommended.sh"
task_list = "TOOLS"
multi_select = false

[[data.entries]]
name = "Use existing conda"
description = "Detect an existing conda or mamba install and save it for Open Genome."
script = "scripts/use_existing_conda.sh"
task_list = "TOOLS"
multi_select = false

[[data.entries]]
name = "Install private conda"
description = "Optional fallback when you do not already have conda. Installs under your user account."
script = "scripts/install_private_miniforge.sh"
task_list = "TOOLS"
multi_select = false

[[data.entries]]
name = "Choose results folder"
description = "Pick where scratch files and results should be stored."
script = "scripts/set_workdir.sh"
task_list = "SETUP"
multi_select = false

[[data.entries]]
name = "Choose sequencing files"
description = "Choose Illumina FASTQ, PacBio/ONT long reads, BAM/CRAM, VCF, assembly, or a folder containing them."
script = "scripts/scan_sequencing_folder.sh"
task_list = "SETUP"
multi_select = false

[[data.entries]]
name = "Choose reference genome"
description = "Pick a reference FASTA file or a folder containing reference files."
script = "scripts/set_reference_path.sh"
task_list = "SETUP"
multi_select = false

[[data.entries]]
name = "Check reference files"
description = "Check whether the configured GRCh38 reference and index files are ready."
script = "../genome-workflow/scripts/reference_bundle_status.sh"
task_list = "CHECK"
multi_select = false

[[data.entries]]
name = "Download reference genome"
description = "Download public GRCh38 reference files to your local Open Genome cache."
script = "../genome-workflow/scripts/fetch_gatk_grch38_bundle.sh"
task_list = "DATA"
multi_select = false

[[data.entries]]
name = "Download Clair3 models"
description = "Download local Clair3 PacBio HiFi and ONT model files for long-read reference runs."
script = "../genome-workflow/scripts/fetch_clair3_models.sh"
task_list = "DATA"
multi_select = false

[[data.entries]]
name = "Set CPU usage limit"
description = "Limit how many CPU threads Open Genome passes to Nextflow workflows."
script = "scripts/show_cpu_count.sh"
task_list = "SETUP"
multi_select = false
