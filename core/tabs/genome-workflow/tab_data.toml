name = "Run Analysis"

[[data]]
name = "Run reference-based analysis"
description = "Align reads or use BAM/CRAM, run QC, call variants, and build a report."
script = "scripts/run_reference_analysis.sh"
task_list = "RUN"
multi_select = false

[[data]]
name = "Run existing VCF report"
description = "Normalize and summarize an existing VCF. No alignment or variant calling."
script = "scripts/run_existing_vcf_report.sh"
task_list = "RUN"
multi_select = false

[[data]]
name = "Run de novo assembly"
description = "Assemble PacBio HiFi/CCS or Oxford Nanopore reads into contigs and review assembly outputs."
script = "scripts/run_denovo_assembly.sh"
task_list = "RUN"
multi_select = false

[[data]]
name = "Advanced workflow steps"
multi_select = false

[[data.entries]]
name = "Check reference files"
description = "Check whether the configured reference genome and index files are ready."
script = "scripts/reference_bundle_status.sh"
task_list = "CHECK"
multi_select = false

[[data.entries]]
name = "Prepare analysis command"
description = "Create the local workflow command without running it yet."
script = "scripts/prepare_open_genome_run.sh"
task_list = "ADV"
multi_select = false

[[data.entries]]
name = "Prepare de novo assembly command"
description = "Create the recommended long-read assembly command without running it yet."
script = "scripts/prepare_denovo_assembly_run.sh"
task_list = "ADV"
multi_select = false

[[data.entries]]
name = "Index reference genome"
description = "Build reference indexes needed for alignment. Usually only needed once."
