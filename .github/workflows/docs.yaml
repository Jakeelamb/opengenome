name: Documentation Check

on:
  pull_request:
    paths:
      - "docs/**"
      - "README.md"
      - ".github/**"
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check release-facing docs for stale upstream links
        run: |
          ! grep -R "ChrisTitus[T]ech\\|c[h]ristitus[.]com\\|linutil[.]c[h]ristitus[.]com" README.md docs .github
