name: Open Genome Release

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release_build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools
        
      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-index-

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install cross-rs for cross-compilation
        run: cargo install cross

      - name: Install Java for Nextflow
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Nextflow
        run: |
          curl -fsSL https://get.nextflow.io -o nextflow
          chmod +x nextflow
          sudo mv nextflow /usr/local/bin/nextflow

      - name: Run release quality gate
        run: scripts/pipeline-quality-gate.sh

      - name: Build x86_64 binary
        run: cargo build --target-dir=build --release --verbose --target=x86_64-unknown-linux-musl -p opengenome_tui --bin opengenome --all-features

      - name: Build aarch64 binary
        run: |
          cross build --target-dir=build --release --verbose --target=aarch64-unknown-linux-musl -p opengenome_tui --bin opengenome --all-features
          mv ./build/aarch64-unknown-linux-musl/release/opengenome ./build/aarch64-unknown-linux-musl/release/opengenome-aarch64

      - name: Extract Version
        id: extract_version
        run: |
          version=$(date +"%Y.%m.%d")
          echo "version=$version" >> $GITHUB_ENV
        shell: bash

      - name: Create and Upload Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.version }}
          name: Open Genome Pre-Release ${{ env.version }}
          body: |
            Local-first terminal setup for personal genomics workflows.

            ![GitHub Downloads (specific asset, specific tag)](https://img.shields.io/github/downloads/Jakeelamb/opengenome/${{ env.version }}/opengenome)
            ![GitHub Downloads (specific asset, specific tag)](https://img.shields.io/github/downloads/Jakeelamb/opengenome/${{ env.version }}/opengenome-aarch64)

          append_body: true
          generate_release_notes: true
          files: |
            ./build/x86_64-unknown-linux-musl/release/opengenome
            ./build/aarch64-unknown-linux-musl/release/opengenome-aarch64
            ./start.sh
            ./startdev.sh
          prerelease: true
        env:
          version: ${{ env.version }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
