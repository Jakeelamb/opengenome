name: Bug Report
description: Report a bug or issue to help us improve.
title: "[Bug]: <title>"
labels: ["type: bug", "initial review required"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thank you for helping us improve! Please provide as much detail as possible to ensure we can address the issue effectively.
  - type: input
    id: open-genome-version
    attributes:
      label: Open Genome Version
      description: Release tag or commit hash.
    validations:
      required: true
  - type: input
    id: operating-system
    attributes:
      label: Operating System
      description: Linux distribution and version, or VM/container image.
      placeholder: e.g., Arch Linux, Ubuntu 24.04, Fedora 41
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: false
      description: Which part failed?
      options:
        - Setup checklist
        - Conda environment
        - File/folder selection
        - Sample import
        - Reference download/indexing
        - Annotation cache
        - Native workflow
        - Reports
        - TUI display
        - Other
    validations:
      required: true
  - type: dropdown
    id: branch
    attributes:
      label: Branch
      multiple: false
      description: Specify the branch of the project you are using.
      options:
        - main
        - release
        - pre-release
        - other
    validations:
      required: true
  - type: input
    id: specify-commit
    attributes:
      label: Commit Hash (if "Other" selected)
      description: Enter commit hash if not using a listed branch.
      placeholder: e.g., 09ebb1c, 09ebb1c604ba8f15fd818de2ead0a9ef2690fc21
  - type: textarea
    id: setup-checklist
    attributes:
      label: Setup Checklist Output
      description: Paste `Setup -> Setup checklist` output if relevant. Remove private paths or sample names first.
      placeholder: |
        Machine
        [x] Conda available ...
        [ ] Reference FASTA ...
  - type: textarea
    id: describe-bug
    attributes:
      label: Description
      description: |
        Provide a clear and concise description of what went wrong.
      placeholder: Describe the issue in detail.
    validations:
      required: true
  - type: textarea
    id: reproduce-steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: |
        A clear and concise description of what you expected to happen.
      placeholder: Describe the correct behavior.
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: |
        Add any other context or information about the problem here.
      placeholder: Include any related logs, error messages, or configurations.
  - type: textarea
    id: screenshots
    attributes:
      label: Logs or Screenshots
      description: |
        If applicable, add logs or screenshots to help explain your problem.
      placeholder: Remember to use code blocks (```) for logs.
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I checked for duplicate issues.
          required: true
        - label: I checked existing discussions.
          required: true
        - label: This issue is not included in the roadmap.
          required: true
        - label: I can reproduce this on the latest main branch or latest release.
          required: true
